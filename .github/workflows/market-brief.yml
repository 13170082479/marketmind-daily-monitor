name: Market Brief

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 7 * * *'
    - cron: '30 13 * * *'
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: market-brief-${{ github.workflow }}-${{ github.event.schedule || github.run_id }}
  cancel-in-progress: false

jobs:
  send-market-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MARKET_MONITOR_TIMEZONE: Asia/Shanghai
      MARKET_MONITOR_RUN_AT: '09:00,15:00,21:30,22:00'
      MARKET_MONITOR_FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      MARKET_MONITOR_FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
      MARKET_API_KEY: ${{ secrets.MARKET_API_KEY }}
      BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
      BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
      GITHUB_WORKFLOW: ${{ github.workflow }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Send market brief
        run: python scripts/send_market_brief.py
